<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Successful</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'DM Sans',sans-serif;
  background:#050f1e;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:rgba(255,255,255,.05);
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:500px;
  text-align:center;
}

h1{color:#60a5fa;}

.details{
  text-align:left;
  margin-top:20px;
}

.details p{
  margin:6px 0;
}

button{
  margin-top:20px;
  padding:12px;
  border:none;
  background:#1a6fff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card" id="pdfContent">

<h1>✅ Registration Successful</h1>
<p>Your form has been submitted.</p>

<div class="details">
<p><strong>Name:</strong> <span id="name"></span></p>
<p><strong>Class:</strong> <span id="class"></span></p>
<p><strong>School:</strong> <span id="school"></span></p>
<p><strong>Parent:</strong> <span id="parent"></span></p>
<p><strong>Date:</strong> <span id="date"></span></p>
</div>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
let data = JSON.parse(localStorage.getItem("candidateData")) || {};

document.getElementById("name").textContent =
  (data.firstName || "") + " " +
  (data.middleName || "") + " " +
  (data.lastName || "");

document.getElementById("class").textContent = data.currentClass || "";
document.getElementById("school").textContent = data.schoolName || "";
document.getElementById("parent").textContent = data.parentName || "";
document.getElementById("date").textContent = data.timestamp || "";

function downloadPDF(){
  const element = document.getElementById("pdfContent");

  html2pdf()
    .from(element)
    .save("VHM_Registration.pdf");
}
</script>

</body>
</html>
